<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survival Game Hub</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #0a0a0a;
  color: white;
  overflow: hidden;
}

/* Welcome */
#welcome {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 2rem;
  animation: fadeOut 2.5s forwards;
}

@keyframes fadeOut {
  0% {opacity: 1;}
  80% {opacity: 1;}
  100% {opacity: 0; visibility: hidden;}
}

/* Menu */
#menu {
  display: none;
  padding: 15px;
  height: 100vh;
  overflow-y: auto;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.game-btn {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.game-btn:hover {
  background: #333;
}

/* Tick */
.completed {
  border: 2px solid #00ff88;
  position: relative;
}

.completed::after {
  content: "✔";
  position: absolute;
  top: 5px;
  right: 10px;
  color: #00ff88;
  font-size: 18px;
}

/* Game */
#gameView {
  display: none;
  height: 100vh;
  position: relative;
}

#gameFrame {
  width: 100%;
  height: 100%;
  border: none;
}

.back-btn {
  position: absolute;
  top: 10px;
  left: 10px;
  background: #222;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  z-index: 10;
}
</style>
</head>

<body>

<div id="welcome">Welcome Survivor...</div>

<div id="menu">
  <h2 style="margin-bottom:10px;">Choose Your Survival</h2>

  <div class="grid" id="gameGrid"></div>
</div>

<div id="gameView">
  <div class="back-btn" onclick="goBack()">⬅ Back</div>
  <iframe id="gameFrame"></iframe>
</div>

<script>

// ================= GAME LIST =================
const GAMES = [
  { id: "zombie", name: "🧟 Zombie Attack", url: "game/zombie.html" },
  { id: "alien", name: "👽 Alien Invasion", url: "game/alien.html" },
  { id: "nuclear", name: "☢️ Nuclear Attack", url: "game/nuclear.html" },
  { id: "last", name: "🧍 Last Human", url: "game/last.html" },
  { id: "ai", name: "🤖 AI Takeover", url: "game/ai.html" },
  { id: "cyclone", name: "🌪 Cyclone", url: "game/cyclone.html" },
  { id: "ice", name: "❄️ Ice Age", url: "game/ice.html" },
  { id: "heat", name: "🔥 Heat Wave", url: "game/heat.html" },
  { id: "emp", name: "📡 EMP Collapse", url: "game/emp.html" },
  { id: "food", name: "🍞 Food Crisis", url: "game/food.html" },
  { id: "flood", name: "🌊 Flood", url: "game/flood.html" },
  { id: "virus", name: "🦠 Virus Quarantine", url: "game/virus.html" }
];

// ================= INIT =================
const grid = document.getElementById("gameGrid");

function renderGames() {
  grid.innerHTML = "";

  const progress = JSON.parse(localStorage.getItem("gameWins")) || {};

  GAMES.forEach(game => {
    const div = document.createElement("div");
    div.className = "game-btn";
    div.innerText = game.name;

    if (progress[game.id]) {
      div.classList.add("completed");
    }

    div.onclick = () => openGame(game);

    grid.appendChild(div);
  });
}

// ================= GAME OPEN =================
function openGame(game) {
  document.getElementById("menu").style.display = "none";
  document.getElementById("gameView").style.display = "block";
  document.getElementById("gameFrame").src = game.url;

  window.currentGame = game.id;
}

// ================= BACK =================
function goBack() {
  document.getElementById("gameView").style.display = "none";
  document.getElementById("menu").style.display = "block";
  document.getElementById("gameFrame").src = "";
}

// ================= SAVE WIN =================
function markWin(gameId) {
  const progress = JSON.parse(localStorage.getItem("gameWins")) || {};
  progress[gameId] = true;
  localStorage.setItem("gameWins", JSON.stringify(progress));

  renderGames();
}

// ================= LISTENER =================
window.addEventListener("message", (e) => {
  if (e.data && e.data.type === "WIN") {
    markWin(e.data.game);
  }
});

// ================= START =================
setTimeout(() => {
  document.getElementById("menu").style.display = "block";
  renderGames();
}, 2500);

</script>

</body>
</html>
