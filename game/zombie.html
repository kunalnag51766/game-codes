<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zombie Survival Game</title>

<style>
* { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #2d2d2d;
  overflow: hidden;
}

body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: linear-gradient(120deg,#e3f2fd,#fce4ec,#e8f5e9);
  animation: bgMove 18s ease infinite;
  z-index: -1;
}
@keyframes bgMove {
  0% { transform: translate(0,0); }
  50% { transform: translate(-10%,-10%); }
  100% { transform: translate(0,0); }
}

.game {
  width: 95%;
  max-width: 650px;
  padding: 20px;
  border-radius: 18px;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  position: relative;
  z-index: 2;
}

.topbar {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
}

h2 { text-align: center; margin: 15px 0; }

.choices button {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border: none;
  border-radius: 12px;
  background: #eceff1;
  cursor: pointer;
  transition: 0.2s;
}
.choices button:hover { background: #cfd8dc; }

.controls {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.controls button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #dde3e6;
  cursor: pointer;
}

.celebration {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  background: radial-gradient(circle, #ffffff, #e8f5e9);
  z-index: 5;
  overflow: hidden;
}

.playAgain {
  margin-top: 20px;
  padding: 12px 20px;
  border: none;
  border-radius: 12px;
  background: #66bb6a;
  color: white;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="game" id="gameUI">
  <div class="topbar">
    <div>❤️ <span id="hp">100</span></div>
    <div>⏸ <span id="pause">3</span></div>
    <div>⏱ <span id="time">10</span>s</div>
  </div>

  <h2 id="scene"></h2>
  <div id="choices" class="choices"></div>

  <div class="controls">
    <button onclick="pauseGame()">⏸</button>
    <button onclick="restartGame()">🔄</button>
    <button onclick="exitGame()">❌</button>
    <button onclick="goBack()">⬅</button>
  </div>
</div>

<div class="celebration" id="celebration">
  <h1>🏆 You Survived!</h1>
  <p>You made smart, realistic decisions 🎉</p>
  <button class="playAgain" onclick="restartGame()">🔄 Play Again</button>
</div>

<script>
let hp=100, pauseLeft=3, history=[], current="start", paused=false, time=10, timer;

const scenes = {

// START
start:{text:"😐 News: Zombie outbreak. You are home.",options:[
{t:"🔒 Lock doors",n:"secure_home"},
{t:"🏃 Escape immediately",n:"street"},
{t:"📞 Call emergency",n:"no_signal"}
]},

// HOME STRATEGY
secure_home:{text:"🔒 House secured.",effect:+5,options:[
{t:"📦 Gather supplies",n:"gather"},
{t:"📻 Listen news",n:"radio"},
{t:"😴 Sleep",n:"death"}
]},

gather:{text:"🎒 You collect food, water, knife.",effect:+10,options:[
{t:"🚪 Leave prepared",n:"street"},
{t:"🔒 Stay inside",n:"starve"},
{t:"🧭 Plan route",n:"plan"}
]},

radio:{text:"📻 Safe zone mentioned.",options:[
{t:"🗺 Follow route",n:"plan"},
{t:"❌ Ignore",n:"street"},
{t:"😴 Sleep",n:"death"}
]},

plan:{text:"🧭 Planning escape.",effect:+5,options:[
{t:"🚶 Move quietly",n:"stealth"},
{t:"🚗 Take car",n:"car_check"},
{t:"🏃 Rush",n:"street"}
]},

// OUTSIDE
street:{text:"🧟 Chaos outside.",options:[
{t:"🏃 Run blindly",n:"chase"},
{t:"🏠 Hide building",n:"hide"},
{t:"🔍 Observe first",n:"stealth"}
]},

stealth:{text:"👀 You move carefully.",effect:+5,options:[
{t:"🚶 Continue",n:"store"},
{t:"🏠 Hide",n:"hide"},
{t:"🔙 Retreat",n:"secure_home"}
]},

hide:{text:"🏠 Temporary safety.",effect:+5,options:[
{t:"🔍 Search area",n:"store"},
{t:"😴 Stay long",n:"death"},
{t:"🚶 Move out",n:"street"}
]},

// RESOURCES
store:{text:"🏪 Abandoned store.",options:[
{t:"🥫 Take food",n:"food"},
{t:"💊 Take meds",n:"med"},
{t:"⚠ Stay long",n:"death"}
]},

food:{text:"🥫 Food collected.",effect:+10,options:[
{t:"🚶 Continue",n:"road"},
{t:"📦 Take more",n:"death"},
{t:"🔙 Leave",n:"street"}
]},

med:{text:"💊 First aid kit found.",effect:+15,options:[
{t:"🚶 Continue",n:"road"},
{t:"📦 Search more",n:"death"},
{t:"🔙 Leave",n:"street"}
]},

// MOVEMENT
road:{text:"🛣 Road ahead.",options:[
{t:"🚗 Find vehicle",n:"car_check"},
{t:"🚶 Walk",n:"fatigue"},
{t:"🏃 Sprint",n:"chase"}
]},

fatigue:{text:"🥵 Tired walking.",effect:-10,options:[
{t:"😴 Rest briefly",n:"rest"},
{t:"🚶 Keep moving",n:"safe_zone"},
{t:"❌ Stop",n:"death"}
]},

rest:{text:"😌 Short rest.",effect:+5,options:[
{t:"🚶 Continue",n:"safe_zone"},
{t:"😴 Sleep",n:"death"},
{t:"🔙 Go back",n:"road"}
]},

// CAR SYSTEM
car_check:{text:"🚗 Found a car.",options:[
{t:"🔑 Try start",n:"car_start"},
{t:"⛽ Check fuel",n:"fuel"},
{t:"❌ Ignore",n:"road"}
]},

fuel:{text:"⛽ Fuel is low.",options:[
{t:"🔍 Search fuel",n:"fuel_find"},
{t:"🚗 Risk drive",n:"car_fail"},
{t:"🚶 Walk",n:"road"}
]},

fuel_find:{text:"⛽ Found small fuel.",effect:+5,options:[
{t:"🚗 Drive",n:"drive"},
{t:"📦 Take more",n:"death"},
{t:"🔙 Back",n:"car_check"}
]},

car_start:{text:"🚗 Engine starts.",options:[
{t:"🚗 Drive",n:"drive"},
{t:"⚠ Rev loud",n:"death"},
{t:"🔙 Exit",n:"road"}
]},

car_fail:{text:"🚗 Car stopped midway.",options:[
{t:"🏃 Escape",n:"chase"},
{t:"🚶 Walk",n:"road"},
{t:"😴 Wait",n:"death"}
]},

drive:{text:"🚗 Driving to safety.",effect:+10,options:[
{t:"🛑 Stop carefully",n:"safe_zone"},
{t:"⚡ Speed reckless",n:"death"},
{t:"🔙 Exit",n:"road"}
]},

// ENCOUNTER
chase:{text:"🧟 Being chased!",effect:-15,options:[
{t:"🏃 Escape smart",n:"safe_zone"},
{t:"⚔ Fight",n:"fight"},
{t:"😵 Panic",n:"death"}
]},

fight:{text:"⚔ Fighting zombies.",effect:-20,options:[
{t:"💪 Win fight",n:"safe_zone"},
{t:"🏃 Run",n:"chase"},
{t:"😵 Lose",n:"death"}
]},

// END
safe_zone:{text:"🏙 You reach military safe zone.",options:[
{t:"➡ Enter safely",n:"win"},
{t:"❌ Ignore",n:"death"},
{t:"🔙 Return",n:"road"}
]},

// FAIL STATES
starve:{text:"🥶 No supplies. You starved.",options:[]},
death:{text:"💀 You died.",options:[]},
win:{text:"🏆 You survived smartly!",options:[]},
no_signal:{text:"📵 No signal. Panic wastes time.",options:[
{t:"🏃 Go outside",n:"street"},
{t:"🔒 Stay",n:"secure_home"},
{t:"😵 Freeze",n:"death"}
]}

};

function render(){
if(paused)return;
clearInterval(timer);

if(current==="win"){
showCelebration();
return;
}

time=10;
startTimer();

let s=scenes[current];
document.getElementById("scene").innerText=s.text;
document.getElementById("hp").innerText=hp;
document.getElementById("pause").innerText=pauseLeft;

if(s.effect){
hp+=s.effect;
if(hp<=0){current="death";render();return;}
}

let c=document.getElementById("choices");
c.innerHTML="";
s.options.forEach(o=>{
let b=document.createElement("button");
b.innerText=o.t;
b.onclick=()=>{history.push(current);current=o.n;render();};
c.appendChild(b);
});
}

function showCelebration(){
document.getElementById("celebration").style.display="flex";
}

function startTimer(){
timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0){clearInterval(timer);alert("⏱ Time up!");restartGame();}
},1000);
}

function pauseGame(){
if(pauseLeft>0){
paused=!paused;
pauseLeft--;
if(paused)clearInterval(timer);
else startTimer();
render();
}else alert("No pause left");
}

function restartGame(){
document.getElementById("celebration").style.display="none";
hp=100;pauseLeft=3;history=[];current="start";paused=false;
render();
}

function exitGame(){
document.body.innerHTML="<h1 style='text-align:center'>Game Exited ❌</h1>";
}

function goBack(){
if(history.length>0){
current=history.pop();
document.getElementById("celebration").style.display="none";
render();
}
}

render();
</script>

</body>
</html>
